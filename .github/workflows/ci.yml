name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin to a known-working version so future bun changes don't
          # silently shift tsc resolution behaviour.
          bun-version: "1.3.11"
      - name: Versions
        run: |
          bun --version
          bun pm -v 2>/dev/null || true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript check
        id: typecheck
        # Invoke the locally-installed tsc directly. Capture output so it
        # can be surfaced in the step summary and (on PRs) posted as a PR
        # comment when the check fails.
        run: |
          ./node_modules/.bin/tsc --version
          set +e
          ./node_modules/.bin/tsc -p tsconfig.app.json --noEmit 2>&1 | tee tsc.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## TypeScript check"
            echo ""
            echo "Exit code: \`$status\`"
            echo ""
            echo '```'
            head -200 tsc.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment failure on PR
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('tsc.log', 'utf8'); } catch (e) { log = '(no log captured)'; }
            const truncated = log.length > 60000 ? log.slice(0, 60000) + '\n...[truncated]' : log;
            const body = `### CI: Frontend typecheck failed\n\n<details><summary>tsc output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  backend:
    name: Backend (syntax + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Syntax check
        working-directory: backend
        run: python -m compileall -q .
      - name: Lint (ruff)
        working-directory: backend
        # `--select` keeps the gate tight on the high-signal rules without
        # forcing the existing code through a full restyle.
        run: ruff check --select E9,F63,F7,F82 .

  backend-tests:
    name: Backend (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: worksoy_ci
      JWT_SECRET: ci-only-secret-0123456789abcdef0123456789abcdef
      EMERGENT_AUTH_URL: https://demobackend.emergentagent.com
      # Placeholder key: checkout goes through the CI stub; payout endpoints
      # degrade to clean 502s, which the payout tests accept.
      STRIPE_API_KEY: sk_test_ci_placeholder
      ADMIN_EMAIL: admin@worksoy.com
      ADMIN_PASSWORD: WorkSoy!Admin2026
      ENVIRONMENT: test
      UPLOADS_DIR: /tmp/worksoy-uploads
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
      # The whole suite hits the API from one IP; the production default of
      # 5 auth attempts/15min would 429 everything after the first tests.
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: "100000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests
      - name: Seed database
        working-directory: backend
        run: python seed.py
      - name: Start API
        working-directory: backend
        env:
          # The emergentintegrations package is platform-provided and not on
          # public PyPI; tests/stubs supplies a CI stand-in (see its README
          # docstring). Must never be on the path in a real deployment.
          PYTHONPATH: tests/stubs
        run: |
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health
      - name: Run pytest
        working-directory: backend
        run: pytest tests -v --tb=short
      - name: Server logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block plaintext admin password
        # Belt-and-braces guard against the exact regression we just fixed.
        run: |
          if git grep -nE 'ADMIN_PASSWORD\s*=\s*"[^"]+"' -- backend/server.py; then
            echo "::error::ADMIN_PASSWORD must come from the environment, not source."
            exit 1
          fi
      - name: Block tracked .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\..+)?$' | grep -v '\.env\.example$'; then
            echo "::error::Real .env files should not be committed."
            exit 1
          fi
