name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin to a known-working version so future bun changes don't
          # silently shift tsc resolution behaviour.
          bun-version: "1.3.11"
      - name: Versions
        run: |
          bun --version
          bun pm -v 2>/dev/null || true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript check
        # Invoke the locally-installed tsc directly. `bun x tsc` would
        # otherwise be sensitive to bun's version-dependent path resolution.
        # Capture output to step summary so failures are visible without
        # having to drill into the raw log.
        run: |
          ./node_modules/.bin/tsc --version
          set +e
          ./node_modules/.bin/tsc -p tsconfig.app.json --noEmit 2>&1 | tee tsc.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## TypeScript check"
            echo ""
            echo "Exit code: \`$status\`"
            echo ""
            echo '```'
            head -200 tsc.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  backend:
    name: Backend (syntax + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Syntax check
        working-directory: backend
        run: python -m compileall -q .
      - name: Lint (ruff)
        working-directory: backend
        # `--select` keeps the gate tight on the high-signal rules without
        # forcing the existing code through a full restyle.
        run: ruff check --select E9,F63,F7,F82 .

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block plaintext admin password
        # Belt-and-braces guard against the exact regression we just fixed.
        run: |
          if git grep -nE 'ADMIN_PASSWORD\s*=\s*"[^"]+"' -- backend/server.py; then
            echo "::error::ADMIN_PASSWORD must come from the environment, not source."
            exit 1
          fi
      - name: Block tracked .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\..+)?$' | grep -v '\.env\.example$'; then
            echo "::error::Real .env files should not be committed."
            exit 1
          fi
